<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { font-family: 'Inter', system-ui, sans-serif; }
.fade-in { animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.slide-in { animation: slideIn 0.3s ease-out; }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.progress-bar { transition: width 0.4s ease; }
.option-card { transition: all 0.15s ease; cursor: pointer; }
.option-card:hover { border-color: #2563eb; background: #eff6ff; }
.option-card.selected { border-color: #2563eb; background: #eff6ff; }
.btn-primary { background: #1a1a1a; color: white; transition: all 0.15s; border: none; cursor: pointer; }
.btn-primary:hover { background: #404040; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: white; color: #1a1a1a; border: 1px solid #e5e5e5; transition: all 0.15s; cursor: pointer; }
.btn-secondary:hover { background: #f5f5f5; }
.pulse-dot { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
<base target="_blank">
</head>

    {

        { text: 'Cao hơn trung bình', value: 3 },

      options: [
        { text: 'Có, nhiều người đang học/chuyển sang', value: 3 },
        { text: 'Một số người quan tâm', value: 2 },
        { text: 'Ít, hầu hết giữ nguyên ngành cũ', value: 1 },
        { text: 'Không biết', value: 0 }
      ]
    },
    {

      text: `Tại ${location}, bạn đánh giá mức độ cạnh tranh khi xin việc trong ${industryName.split('/')[0].trim()}?`,

        { text: 'Rất cao, cần nhiều kinh nghiệm mới được nhận', value: 1 },

// ===================== RENDER HELPERS =====================
const main = document.getElementById('main-content');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');
const progressContainer = document.getElementById('progress-container');

function updateProgress(step) {
  const pct = step === 1 ? 0 : step === 2 ? 25 : step === 3 ? 50 : step === 4 ? 75 : 100;
  progressBar.style.width = pct + '%';
  progressText.textContent = `Bước ${step}/4`;
  if (step > 1 && step < 5) progressContainer.classList.remove('hidden');
  else progressContainer.classList.add('hidden');
}

// ===================== STEP 1 =====================
function renderStep1() {

        <p class="text-muted text-sm">Khám phá ngành nghề phù hợp với bạn chỉ trong 5 phút</p>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold text-primary mb-3">Bạn thuộc nhóm nào?</label>
        <div class="grid grid-cols-2 gap-3">

            </div>

            <div class="text-xs text-muted mt-1">Đang chọn ngành, chọn trường</div>
          </button>
          <button onclick="selectUserType('job_seeker')" class="option-card border border-border rounded-md p-4 text-left ${state.userType === 'job_seeker' ? 'selected' : 'bg-white'}">
            <div class="w-10 h-10 bg-surface rounded-sm flex items-center justify-center mb-3">
              <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <div class="font-semibold text-sm text-primary">Người tìm việc</div>
            <div class="text-xs text-muted mt-1">Đã đi làm hoặc muốn chuyển ngành</div>
          </button>
        </div>
      </div>
      <div class="mb-8">
        <label class="block text-sm font-semibold text-primary mb-3">Mức độ kinh nghiệm của bạn?</label>
        <div class="space-y-2">
          ${[
            { val: 'none', label: 'Chưa có kinh nghiệm', desc: 'Chưa từng đi làm thêm hoặc thực tập' },
            { val: 'part_time', label: 'Kinh nghiệm làm thêm / thực tập', desc: 'Đã từng làm part-time, intern hoặc project nhỏ' },
            { val: 'experienced', label: 'Đã có kinh nghiệm làm việc chính thức', desc: 'Từng làm full-time từ 1 năm trở lên' }

function selectUserType(type) { state.userType = type; renderStep1(); }
function selectExp(level) { state.experienceLevel = level; renderStep1(); }
function goToStep2() { if (!state.userType || !state.experienceLevel) return; state.step = 2; renderStep2(); }

        <h2 class="text-xl font-bold text-primary">Định vị & Mục tiêu</h2>
        <p class="text-sm text-muted mt-1">Thông tin này giúp chúng tôi cá nhân hóa kết quả cho bạn</p>
      </div>
      <div class="mb-5">
        <label class="block text-sm font-semibold text-primary mb-2">Địa điểm <span class="text-red-500">*</span></label>

            oninput="filterProvinces(this.value)" onclick="showProvinceList()">

        </div>

function nextQuestion() {
  if (selectedOptionIndex === null) return;
  const allQuestions = getAllQuestions();
  const q = allQuestions[state.currentQuestionIndex];
  state.answers.push({ questionId: q.id, selectedOption: selectedOptionIndex, timestamp: Date.now() });
  selectedOptionIndex = null;
  if (state.currentQuestionIndex < allQuestions.length - 1) { state.currentQuestionIndex++; renderStep3(); }
  else { goToProcessing(); }
}
function prevQuestion() {
  if (state.currentQuestionIndex > 0) { state.currentQuestionIndex--; state.answers.pop(); selectedOptionIndex = null; renderStep3(); }
}

- Ngành đã chọn: ${state.industry ? industries.find(i => i.id === state.industry)?.name : 'Chưa biết'}

## CÂU TRẢ LỜI TÍNH CÁCH (7 câu)
${staticAns.map((a, i) => `${i+1}. ${a.question}\n   → Trả lời: "${a.answer}" (trục: ${a.trait})`).join('\n')}

## CÂU TRẢ LỜI THỰC ĐỊA (5 câu)
${dynamicAns.map((a, i) => `${i+1}. ${a.question}\n   → Trả lời: "${a.answer}" (điểm: ${a.value}/3)`).join('\n')}

## DANH MỤC NGÀNH THAM KHẢO (với trọng số 4 trục tính cách)
${industryList}

## YÊU CẦU OUTPUT JSON
{
  "matchScore": <số 0-100, độ phù hợp ngành đã chọn nếu có>,

    {"id": "<id>", "name": "<tên đầy đủ>", "matchScore": <0-100>, "reason": "<lý do ngắn gọn 1 câu>"}
  ],

    "organized": <số 0-100>,
    "creative": <số 0-100>,
    "analytical": <số 0-100>,

  },

  },
  "overallAnalysis": "<phân tích tổng quan 3-4 câu, thực tế và động viên>"
}

Quy tắc:
- topIndustries tối đa 3 ngành, sắp xếp giảm dần matchScore.
- Nếu user chưa chọn ngành, matchScore = 0 và topIndustries là gợi ý.
- realityScore dựa trên câu trả lời thực địa + nhận định thị trường thực tế tại ${state.location}.

}

async function callAI() {
  const statusEl = document.getElementById('ai-status');
  try {
    statusEl.textContent = 'Đang gửi dữ liệu đến AI engine...';
    const response = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: 'Bạn là chuyên gia định hướng nghề nghiệp. Chỉ trả về JSON hợp lệ, không thêm text khác.' },
          { role: 'user', content: buildAIPrompt() }
        ],
        temperature: 0.4,
        max_tokens: 2000
      })
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${await response.text()}`);
    }

    const data = await response.json();
    const content = data.choices?.[0]?.message?.content;
    if (!content) throw new Error('Empty AI response');

    statusEl.textContent = 'Đang xử lý kết quả...';

    let aiResult;
    try {
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      aiResult = JSON.parse(jsonMatch ? jsonMatch[0] : content);
    } catch (e) {
      throw new Error('Invalid JSON from AI: ' + e.message);
    }

    if (!aiResult.topIndustries || !Array.isArray(aiResult.topIndustries) || aiResult.topIndustries.length === 0) {
      throw new Error('Missing topIndustries');
    }

    state.result = {
      matchScore: aiResult.matchScore ?? 0,
      selectedMatch: state.industry ? { ...industries.find(i => i.id === state.industry), matchScore: aiResult.matchScore ?? 0 } : null,
      topIndustries: aiResult.topIndustries.map(t => ({ id: t.id || '', name: t.name || '', matchScore: t.matchScore || 0, reason: t.reason || '' })),
      realityPct: aiResult.realityScore ?? 50,
      realityLabel: aiResult.realityLabel || 'Ổn định',
      realityColor: getRealityColor(aiResult.realityLabel),
      realityAnalysis: aiResult.realityAnalysis || '',
      traits: {
        organized: (aiResult.personalityBreakdown?.organized ?? 25) / 100,
        creative: (aiResult.personalityBreakdown?.creative ?? 25) / 100,
        analytical: (aiResult.personalityBreakdown?.analytical ?? 25) / 100,
        social: (aiResult.personalityBreakdown?.social ?? 25) / 100
      },
      actionPlan: {
        title: aiResult.actionPlan?.title || 'Bản đồ hành động',
        items: aiResult.actionPlan?.items || []
      },
      overallAnalysis: aiResult.overallAnalysis || ''
    };
    state.aiUsed = true;
    state.step = 4;
    renderStep4();

  } catch (err) {
    console.error('AI Error:', err);
    statusEl.textContent = 'AI gặp lỗi, đang chuyển sang chế độ phân tích cục bộ...';
    setTimeout(() => {
      calculateFallback();
      state.step = 4;
      renderStep4();
    }, 1500);
  }
}

function getRealityColor(label) {
  if (label.includes('Tăng trưởng')) return 'text-green-600 bg-green-50';
  if (label.includes('thận trọng')) return 'text-amber-600 bg-amber-50';
  return 'text-blue-600 bg-blue-50';
}

// ===================== FALLBACK CALCULATION =====================
function calculateFallback() {
  const traits = { organized: 0, creative: 0, analytical: 0, social: 0 };
  staticQuestions.forEach((q) => {
    const ans = state.answers.find(a => a.questionId === q.id);
    if (ans) { const opt = q.options[ans.selectedOption]; traits[opt.trait] += opt.weight; }
  });
  const total = Object.values(traits).reduce((a, b) => a + b, 0);
  if (total > 0) Object.keys(traits).forEach(k => traits[k] = traits[k] / total);

  const matches = industries.map(ind => {
    let score = 0;
    score += traits.organized * (ind.traits.organized || 0);
    score += traits.creative * (ind.traits.creative || 0);
    score += traits.analytical * (ind.traits.analytical || 0);
    score += traits.social * (ind.traits.social || 0);
    return { ...ind, matchScore: Math.round(score * 100) };
  }).sort((a, b) => b.matchScore - a.matchScore);

  let realityScore = 0;
  const dynamicAnswers = state.answers.filter(a => a.questionId.startsWith('dq'));
  dynamicAnswers.forEach(a => {
    const q = generateDynamicQuestions(state.location, state.industry).find(q => q.id === a.questionId);
    if (q) realityScore += q.options[a.selectedOption].value;
  });
  const maxReality = dynamicAnswers.length * 3;
  const realityPct = maxReality > 0 ? Math.round((realityScore / maxReality) * 100) : 50;

  let realityLabel, realityColor;
  if (realityPct >= 70) { realityLabel = 'Tăng trưởng tốt'; realityColor = 'text-green-600 bg-green-50'; }
  else if (realityPct >= 45) { realityLabel = 'Ổn định'; realityColor = 'text-blue-600 bg-blue-50'; }
  else { realityLabel = 'Cần thận trọng'; realityColor = 'text-amber-600 bg-amber-50'; }

  const selectedMatch = state.industry ? matches.find(m => m.id === state.industry) : null;
  const topIndustries = matches.slice(0, 3).map(m => ({ ...m, reason: '' }));
  const isStudent = state.userType === 'student';
  const actionPlan = isStudent ? {
    title: 'Lộ trình cho học sinh',
    items: [
      `Tìm hiểu điểm chuẩn các trường đào tạo ${selectedMatch?.name || topIndustries[0].name} tại ${state.location} và các tỉnh lân cận`,
      'Rèn luyện nền tảng: Tiếng Anh (IELTS 6.5+), Tin học văn phòng thành thạo',
      'Tham gia các câu lạc bộ học thuật hoặc cuộc thi liên quan để xây dựng portfolio',
      'Tìm cơ hội job shadowing hoặc phỏng vấn người đang làm trong ngành'
    ]
  } : {
    title: 'Lộ trình cho người đi làm',
    items: [
      `Đánh giá kỹ năng hiện tại so với JD phổ biến của ${selectedMatch?.name || topIndustries[0].name}`,
      'Đăng ký khóa học nâng cấp kỹ năng chuyên môn trên Coursera/Udemy',
      'Tham gia hội nhóm ngành trên LinkedIn và Facebook để cập nhật trend',
      'Xây dựng portfolio cá nhân hoặc GitHub (nếu ngành kỹ thuật)'
    ]
  };

  state.result = {
    matchScore: selectedMatch?.matchScore || 0,
    selectedMatch,
    topIndustries,
    realityPct,
    realityLabel,
    realityColor,
    realityAnalysis: '',
    traits,
    actionPlan,
    overallAnalysis: ''
  };
  state.aiUsed = false;
}

            ${[
              { label: 'Tổ chức & Lãnh đạo', val: Math.round(r.traits.organized * 100) },
              { label: 'Sáng tạo & Thẩm mỹ', val: Math.round(r.traits.creative * 100) },
              { label: 'Phân tích & Nghiên cứu', val: Math.round(r.traits.analytical * 100) },
              { label: 'Kết nối & Hỗ trợ', val: Math.round(r.traits.social * 100) }
            ].map(t => `
              <div class="text-center p-2 bg-white border border-border rounded-sm">
                <div class="text-lg font-bold text-primary">${t.val}%</div>
                <div class="text-xs text-muted">${t.label}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <div class="border border-border rounded-md p-5 mb-4 bg-white">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-6 h-6 bg-primary rounded-sm flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          </div>
          <h3 class="font-semibold text-primary">Góc Thực Tế Thị Trường</h3>
        </div>
        <div class="flex items-center gap-4 mb-4">
          <div class="flex-1">
            <div class="text-sm text-muted mb-1">Sức khỏe ngành tại ${state.location}</div>
            <div class="text-2xl font-bold text-primary">${r.realityPct}<span class="text-sm text-muted font-normal">/100</span></div>
          </div>
          <span class="px-3 py-1.5 rounded-sm text-xs font-semibold ${r.realityColor}">${r.realityLabel}</span>
        </div>
        ${r.realityAnalysis ? `<p class="text-sm text-primary leading-relaxed mb-3">${r.realityAnalysis}</p>` : ''}
        <div class="space-y-2 text-sm">
          <div class="flex items-start gap-2">
            <svg class="w-4 h-4 text-green-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            <span class="text-primary">Nhu cầu tuyển dụng ${r.realityPct >= 60 ? 'đang tăng' : 'ổn định'} theo dữ liệu địa phương</span>
          </div>
          <div class="flex items-start gap-2">
            <svg class="w-4 h-4 text-amber-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <span class="text-primary">Rủi ro tự động hóa: Trung bình (cần cập nhật kỹ năng liên tục)</span>
          </div>
        </div>
      </div>

      <div class="border border-border rounded-md p-5 mb-6 bg-white">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-6 h-6 bg-primary rounded-sm flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
          </div>
          <h3 class="font-semibold text-primary">Bản Đồ Hành Động</h3>
        </div>
        <div class="text-sm font-medium text-primary mb-3">${r.actionPlan.title}</div>
        <div class="space-y-3">
          ${r.actionPlan.items.map((item, idx) => `
            <div class="flex items-start gap-3">
              <div class="w-5 h-5 bg-primary text-white rounded-sm flex items-center justify-center text-xs font-bold flex-shrink-0 mt-0.5">${idx + 1}</div>
              <p class="text-sm text-primary leading-relaxed">${item}</p>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="flex flex-col gap-3">
        <button onclick="saveResult()" id="btn-save" class="btn-primary w-full py-3 rounded-md font-medium text-sm">${state.saved ? '✓ Đã lưu kết quả' : 'Lưu kết quả'}</button>
        <div class="flex gap-3">
          <button onclick="shareResult()" class="btn-secondary flex-1 py-2.5 rounded-md text-sm font-medium">Chia sẻ</button>
          <button onclick="retakeQuiz()" class="btn-secondary flex-1 py-2.5 rounded-md text-sm font-medium">Làm lại</button>
        </div>
      </div>
    </div>
  `;
}

function saveResult() {
  state.saved = true;
  document.getElementById('btn-save').textContent = '✓ Đã lưu kết quả';
  alert('Kết quả đã được lưu! (Demo - trong thực tế sẽ yêu cầu đăng nhập)');
}
function shareResult() {
  const text = `Kết quả định hướng nghề nghiệp của tôi tại CareerMap:
📍 ${state.location}
🎯 Ngành phù hợp nhất: ${state.result.topIndustries[0].name} (${state.result.topIndustries[0].matchScore}%)
📊 Sức khỏe thị trường: ${state.result.realityLabel}`;
  if (navigator.share) navigator.share({ title: 'Kết quả CareerMap', text });
  else navigator.clipboard.writeText(text).then(() => alert('Đã sao chép kết quả vào clipboard!'));
}
function retakeQuiz() {
  state.step = 1; state.answers = []; state.currentQuestionIndex = 0; state.result = null; state.saved = false; state.aiUsed = false;
  renderStep1();
}

document.addEventListener('click', (e) => {
  const pl = document.getElementById('province-list');
  const il = document.getElementById('industry-list');
  const pi = document.getElementById('location-input');
  const ii = document.getElementById('industry-input');
  if (pl && !pl.contains(e.target) && e.target !== pi) pl.classList.add('hidden');
  if (il && !il.contains(e.target) && e.target !== ii) il.classList.add('hidden');
});

renderStep1();
</script>
</body>
</html>
